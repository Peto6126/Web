<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PH vs AFT Survival Models</title>
<style>
  :root{
    --bg:#ffffff; --ink:#33403a; --grid:#33403a1a;
    --baseline:#1b1c1d; --adjusted:#0b57d0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:20px; background:var(--bg); color:var(--ink);
    font-family:"Hiragino Sans","Yu Gothic",system-ui,sans-serif;
    display:flex; flex-direction:column; align-items:center; gap:14px;
  }
  h3{margin:0; font-size:17px; font-weight:600;}
  #viz{width:100%; max-width:720px;}
  svg{width:100%; height:auto; display:block;}
  .legend{display:flex; gap:16px; font-size:12px; margin-top:-4px;}
  .legend span{display:inline-flex; align-items:center; gap:6px;}
  .swatch{width:12px; height:12px; border-radius:2px;}
  .controls{width:100%; max-width:720px; display:flex; flex-direction:column; gap:14px;}
  .row{display:flex; align-items:center; gap:12px;}
  .row label{flex:0 0 170px; font-size:13px;}
  .row input[type=range]{flex:1;}
  .row .val{flex:0 0 46px; text-align:right; font-size:13px; font-variant-numeric:tabular-nums;}
  .seg{display:flex; gap:4px;}
  .seg button{
    flex:1; padding:6px 12px; border:1px solid #ccc; background:#f5f5f5;
    border-radius:6px; cursor:pointer; font-size:13px;
  }
  .seg button.active{background:var(--adjusted); color:#fff; border-color:var(--adjusted);}
  .hud{display:flex; gap:24px; font-size:13px;}
  .hud b{font-variant-numeric:tabular-nums;}
</style>
</head>
<body>

<h3>PH vs AFT Survival Models</h3>
<div class="legend">
  <span><span class="swatch" style="background:var(--baseline);"></span>Baseline</span>
  <span><span class="swatch" style="background:var(--adjusted);"></span>Adjusted</span>
</div>

<div id="viz">
  <svg viewBox="0 0 700 350" xmlns="http://www.w3.org/2000/svg">
    <g id="gridX"></g>
    <g id="gridY"></g>
    <line id="axisX" stroke="var(--ink)" stroke-opacity="0.4"/>
    <line id="axisY" stroke="var(--ink)" stroke-opacity="0.4"/>
    <path id="baseline" fill="none" stroke="var(--baseline)" stroke-width="2.5" stroke-opacity="0.5"/>
    <path id="adjusted" fill="none" stroke="var(--adjusted)" stroke-width="3"/>
    <line id="guide" stroke="#dcdfe5" stroke-dasharray="3,3"/>
    <circle id="dot1" r="4" fill="var(--adjusted)"/>
    <circle id="dot2" r="4" fill="var(--adjusted)"/>
    <text id="xLabel" fill="var(--ink)" font-size="12" text-anchor="end"></text>
    <text id="yLabel" fill="var(--ink)" font-size="12" transform="rotate(-90)"></text>
  </svg>
</div>

<div class="controls">
  <div class="row">
    <label>モデルの種類</label>
    <div class="seg">
      <button id="btnPH" class="active">PH</button>
      <button id="btnAFT">AFT</button>
    </div>
  </div>
  <div class="row">
    <label for="beta">共変量の効果 (β)</label>
    <input type="range" id="beta" min="-2" max="2" step="0.1" value="0.5">
    <span class="val" id="betaVal">0.5</span>
  </div>
  <div class="hud">
    <div>モデル: <b id="hudModel">PH</b></div>
    <div>シフトの向き: <b id="hudShift">垂直 (ハザード)</b></div>
  </div>
</div>

<script>
const M = {l:60, r:20, t:20, b:40};
const W = 700, H = 350;
const plotW = W - M.l - M.r, plotH = H - M.t - M.b;
const T_MAX = 20;
const domainY = [0, 1];

function sx(t){ return M.l + (t/T_MAX) * plotW; }
function sy(s){ return M.t + plotH - (s - domainY[0])/(domainY[1]-domainY[0]) * plotH; }

const S0_LAMBDA = 10, S0_K = 1.5;
function S0(t){ return Math.exp(-Math.pow(t/S0_LAMBDA, S0_K)); }

function pathFromPoints(pts){
  return pts.map((p,i) => (i===0?'M':'L') + sx(p.t).toFixed(2) + ',' + sy(p.s).toFixed(2)).join('');
}

// grid + axes (static)
const gridX = document.getElementById('gridX');
const gridY = document.getElementById('gridY');
for (let t=0; t<=T_MAX; t+=2){
  const lx = document.createElementNS('http://www.w3.org/2000/svg','line');
  lx.setAttribute('x1', sx(t)); lx.setAttribute('x2', sx(t));
  lx.setAttribute('y1', sy(0)); lx.setAttribute('y2', sy(1));
  lx.setAttribute('stroke','var(--grid)');
  gridX.appendChild(lx);

  const tx = document.createElementNS('http://www.w3.org/2000/svg','text');
  tx.setAttribute('x', sx(t)); tx.setAttribute('y', sy(0)+16);
  tx.setAttribute('font-size','10'); tx.setAttribute('text-anchor','middle');
  tx.setAttribute('fill','var(--ink)'); tx.textContent = t;
  gridX.appendChild(tx);
}
for (let v=0; v<=1.0001; v+=0.1){
  const ly = document.createElementNS('http://www.w3.org/2000/svg','line');
  ly.setAttribute('y1', sy(v)); ly.setAttribute('y2', sy(v));
  ly.setAttribute('x1', sx(0)); ly.setAttribute('x2', sx(T_MAX));
  ly.setAttribute('stroke','var(--grid)');
  gridY.appendChild(ly);

  const ty = document.createElementNS('http://www.w3.org/2000/svg','text');
  ty.setAttribute('x', sx(0)-8); ty.setAttribute('y', sy(v)+3);
  ty.setAttribute('font-size','10'); ty.setAttribute('text-anchor','end');
  ty.setAttribute('fill','var(--ink)'); ty.textContent = v.toFixed(1);
  gridY.appendChild(ty);
}
document.getElementById('axisX').setAttribute('x1', sx(0));
document.getElementById('axisX').setAttribute('x2', sx(T_MAX));
document.getElementById('axisX').setAttribute('y1', sy(0));
document.getElementById('axisX').setAttribute('y2', sy(0));
document.getElementById('axisY').setAttribute('y1', sy(0));
document.getElementById('axisY').setAttribute('y2', sy(1));
document.getElementById('axisY').setAttribute('x1', sx(0));
document.getElementById('axisY').setAttribute('x2', sx(0));

document.getElementById('xLabel').setAttribute('x', sx(T_MAX));
document.getElementById('xLabel').setAttribute('y', sy(0)+34);
document.getElementById('xLabel').textContent = 'Time (t) →';

const yLabelEl = document.getElementById('yLabel');
yLabelEl.setAttribute('x', -(sy(0)-14));
yLabelEl.setAttribute('y', 16);
yLabelEl.textContent = 'Survival Probability S(t) ↑';

// baseline curve is static (doesn't depend on beta/model)
const baselinePts = [];
for (let i=0; i<=60; i++){
  const t = (i/60)*T_MAX;
  baselinePts.push({t, s: S0(t)});
}
document.getElementById('baseline').setAttribute('d', pathFromPoints(baselinePts));

let model = 'PH';

function render(){
  const beta = parseFloat(document.getElementById('beta').value);
  document.getElementById('betaVal').textContent = beta.toFixed(1);
  const expBeta = Math.exp(beta);

  const adjPts = [];
  for (let i=0; i<=60; i++){
    const t = (i/60)*T_MAX;
    const s0 = S0(t);
    let s;
    if (model === 'PH'){
      s = Math.pow(s0, expBeta);
    } else {
      s = S0(t * Math.exp(-beta));
    }
    s = Math.max(0, Math.min(1, s));
    adjPts.push({t, s});
  }
  document.getElementById('adjusted').setAttribute('d', pathFromPoints(adjPts));

  const guide = document.getElementById('guide');
  const dot1 = document.getElementById('dot1');
  const dot2 = document.getElementById('dot2');

  if (model === 'PH'){
    // vertical guide at t=10
    guide.setAttribute('x1', sx(10)); guide.setAttribute('x2', sx(10));
    guide.setAttribute('y1', sy(0)); guide.setAttribute('y2', sy(1));
    dot1.setAttribute('cx', sx(10)); dot1.setAttribute('cy', sy(S0(10)));
    dot2.setAttribute('cx', sx(10)); dot2.setAttribute('cy', sy(Math.pow(S0(10), expBeta)));
  } else {
    // horizontal guide at s=0.5
    guide.setAttribute('x1', sx(0)); guide.setAttribute('x2', sx(T_MAX));
    guide.setAttribute('y1', sy(0.5)); guide.setAttribute('y2', sy(0.5));
    const t_base = S0_LAMBDA * Math.pow(-Math.log(0.5), 1/S0_K);
    const t_adj = t_base * expBeta;
    dot1.setAttribute('cx', sx(t_base)); dot1.setAttribute('cy', sy(0.5));
    dot2.setAttribute('cx', sx(t_adj)); dot2.setAttribute('cy', sy(0.5));
  }

  document.getElementById('hudModel').textContent = model;
  document.getElementById('hudShift').textContent = model === 'PH' ? '垂直 (ハザード)' : '水平 (時間)';
}

document.getElementById('beta').addEventListener('input', render);
document.getElementById('btnPH').addEventListener('click', () => {
  model = 'PH';
  document.getElementById('btnPH').classList.add('active');
  document.getElementById('btnAFT').classList.remove('active');
  render();
});
document.getElementById('btnAFT').addEventListener('click', () => {
  model = 'AFT';
  document.getElementById('btnAFT').classList.add('active');
  document.getElementById('btnPH').classList.remove('active');
  render();
});

render();
</script>
</body>
</html>
