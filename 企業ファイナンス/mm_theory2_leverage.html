<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MM Theory II: Capital Cost and Leverage (No Tax)</title>
<style>
  :root{
    --bg:#ffffff; --ink:#33403a; --grid:#33403a1a;
    --re:#1558d6; --wacc:#046e00; --rd:#c0151d; --rho:#555;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:20px; background:var(--bg); color:var(--ink);
    font-family:"Hiragino Sans","Yu Gothic",system-ui,sans-serif;
    display:flex; flex-direction:column; align-items:center; gap:14px;
  }
  h3{margin:0; font-size:16px; font-weight:600; text-align:center;}
  #viz{width:100%; max-width:760px;}
  svg{width:100%; height:auto; display:block;}
  .legend{display:flex; gap:18px; font-size:12px; flex-wrap:wrap; margin-top:6px; justify-content:center;}
  .legend span{display:inline-flex; align-items:center; gap:6px;}
  .swatchLine{width:16px; height:0; border-top:3px solid;}
  .controls{width:100%; max-width:760px; display:flex; flex-direction:column; gap:14px;}
  .row{display:flex; align-items:center; gap:12px;}
  .row label{flex:0 0 180px; font-size:13px;}
  .row input[type=range]{flex:1;}
  .row .val{flex:0 0 60px; text-align:right; font-size:13px; font-variant-numeric:tabular-nums;}
  .hud{display:flex; gap:20px; font-size:13px; flex-wrap:wrap;}
  .hud b{font-variant-numeric:tabular-nums;}
</style>
</head>
<body>

<h3>MM Theory II: Capital Cost and Leverage (No Tax)</h3>

<div id="viz">
  <svg id="chart" viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg"></svg>
  <div class="legend">
    <span><span class="swatchLine" style="border-color:var(--re);"></span>自己資本コスト (r_e)</span>
    <span><span class="swatchLine" style="border-color:var(--wacc); border-top-style:dashed;"></span>WACC (加重平均資本コスト)</span>
    <span><span class="swatchLine" style="border-color:var(--rd); border-top-style:dotted;"></span>負債コスト (r_d)</span>
  </div>
</div>

<div class="controls">
  <div class="row">
    <label for="de">D/E比率</label>
    <input type="range" id="de" min="0" max="4" step="0.1" value="1.0">
    <span class="val" id="deVal">1.0</span>
  </div>
  <div class="row">
    <label for="rho">事業リスク (ρ)</label>
    <input type="range" id="rho" min="0.05" max="0.20" step="0.01" value="0.12">
    <span class="val" id="rhoVal">12%</span>
  </div>
  <div class="row">
    <label for="rd">負債コスト (r_d)</label>
    <input type="range" id="rd" min="0.01" max="0.10" step="0.01" value="0.05">
    <span class="val" id="rdVal">5%</span>
  </div>
  <div class="hud">
    <div>現在の r_e: <b id="hudRe">-</b></div>
    <div>現在の WACC: <b id="hudWacc">-</b></div>
  </div>
</div>

<script>
const M = {l:60, r:20, t:20, b:44};
const svgW = 700, svgH = 400;
const plotW = svgW - M.l - M.r, plotH = svgH - M.t - M.b;
const xMax = 4.2, yMax = 45; // 授業資料に合わせて固定スケール

function sx(v){ return M.l + (v/xMax) * plotW; }
function sy(v){ return M.t + plotH - (v/yMax) * plotH; }

const svg = document.getElementById('chart');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs){
  const e = document.createElementNS(ns, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}

// ---- 固定の軸・グリッド(スケールは常に0-4.2 / 0-45%で固定) ----
function drawAxes(){
  for (let v=0; v<=4; v+=1){
    svg.appendChild(el('line', {x1:sx(v), x2:sx(v), y1:sy(0), y2:sy(yMax), stroke:'var(--grid)'}));
    const t = el('text', {x:sx(v), y:sy(0)+16, 'font-size':10, 'text-anchor':'middle', fill:'var(--ink)'});
    t.textContent = v.toFixed(1);
    svg.appendChild(t);
  }
  for (let v=0; v<=45; v+=5){
    svg.appendChild(el('line', {x1:sx(0), x2:sx(xMax), y1:sy(v), y2:sy(v), stroke:'var(--grid)'}));
    const t = el('text', {x:sx(0)-8, y:sy(v)+3, 'font-size':10, 'text-anchor':'end', fill:'var(--ink)'});
    t.textContent = v;
    svg.appendChild(t);
  }
  svg.appendChild(el('line', {x1:sx(0), x2:sx(xMax), y1:sy(0), y2:sy(0), stroke:'var(--ink)', 'stroke-opacity':0.4}));
  svg.appendChild(el('line', {x1:sx(0), x2:sx(0), y1:sy(0), y2:sy(yMax), stroke:'var(--ink)', 'stroke-opacity':0.4}));

  const xLabel = el('text', {x:sx(xMax), y:sy(0)+36, 'font-size':12, 'text-anchor':'end', fill:'var(--ink)'});
  xLabel.textContent = '負債比率 (D/E) →';
  svg.appendChild(xLabel);

  const yLabel = el('text', {x:-(sy(0)-16), y:16, 'font-size':12, transform:'rotate(-90)', fill:'var(--ink)'});
  yLabel.textContent = '資本コスト (%) ↑';
  svg.appendChild(yLabel);
}

// これらの要素は render() のたびに更新する
let pathRe, pathWacc, lineRd, dotRe, dotWacc, labelRe, labelWacc, labelRd, labelRho;

function setupDynamicElements(){
  pathRe = el('path', {fill:'none', stroke:'var(--re)', 'stroke-width':2.5});
  pathWacc = el('path', {fill:'none', stroke:'var(--wacc)', 'stroke-width':3, 'stroke-dasharray':'8,5'});
  lineRd = el('line', {stroke:'var(--rd)', 'stroke-width':2, 'stroke-dasharray':'2,3'});
  dotRe = el('circle', {r:6, fill:'var(--re)'});
  dotWacc = el('circle', {r:6, fill:'var(--wacc)'});
  labelRe = el('text', {'font-size':12, fill:'var(--re)', 'font-weight':'bold'});
  labelWacc = el('text', {'font-size':12, fill:'var(--wacc)', 'font-weight':'bold'});
  labelRd = el('text', {'font-size':12, fill:'var(--rd)'});
  labelRho = el('text', {'font-size':12, fill:'var(--rho)'});

  [pathWacc, pathRe, lineRd, dotRe, dotWacc, labelRe, labelWacc, labelRd, labelRho].forEach(e => svg.appendChild(e));
}

function pathFromPointsClipped(pts){
  // yMaxを超える点は描画せず、そこでラインを一旦切る(クリップではなく非表示にする)
  let d = '';
  let drawing = false;
  for (const p of pts){
    if (p.y <= yMax && p.y >= 0){
      const cmd = drawing ? 'L' : 'M';
      d += cmd + sx(p.x).toFixed(2) + ',' + sy(p.y).toFixed(2);
      drawing = true;
    } else {
      drawing = false;
    }
  }
  return d;
}

function render(){
  const de = parseFloat(document.getElementById('de').value);
  const rho = parseFloat(document.getElementById('rho').value);
  const rd = parseFloat(document.getElementById('rd').value);
  document.getElementById('deVal').textContent = de.toFixed(1);
  document.getElementById('rhoVal').textContent = (rho*100).toFixed(0) + '%';
  document.getElementById('rdVal').textContent = (rd*100).toFixed(0) + '%';

  // r_e ライン: r_e = rho + (rho - rd) * D/E
  const rePts = [];
  const waccPts = [];
  for (let x=0; x<=xMax; x+=0.05){
    const re = rho + (rho - rd) * x;
    const wacc = (1/(1+x))*re + (x/(1+x))*rd;
    rePts.push({x, y: re*100});
    waccPts.push({x, y: wacc*100});
  }
  pathRe.setAttribute('d', pathFromPointsClipped(rePts));
  pathWacc.setAttribute('d', pathFromPointsClipped(waccPts));

  // r_d 水平線
  lineRd.setAttribute('x1', sx(0)); lineRd.setAttribute('x2', sx(xMax));
  lineRd.setAttribute('y1', sy(rd*100)); lineRd.setAttribute('y2', sy(rd*100));

  // 現在のD/Eでの値
  const currentRe = rho + (rho - rd) * de;
  const currentWacc = (1/(1+de))*currentRe + (de/(1+de))*rd;

  dotRe.setAttribute('cx', sx(de)); dotRe.setAttribute('cy', sy(currentRe*100));
  dotWacc.setAttribute('cx', sx(de)); dotWacc.setAttribute('cy', sy(currentWacc*100));

  labelRe.setAttribute('x', sx(de)+10); labelRe.setAttribute('y', sy(currentRe*100)-6);
  labelRe.textContent = `r_e: ${(currentRe*100).toFixed(1)}%`;

  labelWacc.setAttribute('x', sx(de)+10); labelWacc.setAttribute('y', sy(currentWacc*100)+16);
  labelWacc.textContent = `WACC: ${(currentWacc*100).toFixed(1)}%`;

  labelRd.setAttribute('x', sx(0.1)); labelRd.setAttribute('y', sy(rd*100)-6);
  labelRd.textContent = `r_d: ${(rd*100).toFixed(0)}%`;

  labelRho.setAttribute('x', sx(0.1)); labelRho.setAttribute('y', sy(rho*100)+16);
  labelRho.textContent = `事業リスク (ρ): ${(rho*100).toFixed(0)}%`;

  document.getElementById('hudRe').textContent = (currentRe*100).toFixed(1) + '%';
  document.getElementById('hudWacc').textContent = (currentWacc*100).toFixed(1) + '%';
}

drawAxes();
setupDynamicElements();
['de','rho','rd'].forEach(id => document.getElementById(id).addEventListener('input', render));
render();
</script>
</body>
</html>
