<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>LBO資産形成シミュレーション</title>
<style>
  :root{
    --bg:#ffffff; --ink:#33403a; --grid:#33403a1a;
    --equity0:#1f77b4; --debt:#d62728; --growth:#2ca02c; --repay:#ff7f0e; --tax:#ffd700;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:20px; background:var(--bg); color:var(--ink);
    font-family:"Hiragino Sans","Yu Gothic",system-ui,sans-serif;
    display:flex; flex-direction:column; align-items:center; gap:14px;
  }
  h3{margin:0; font-size:16px; font-weight:600; text-align:center;}
  #viz{width:100%; max-width:640px;}
  svg{width:100%; height:auto; display:block;}
  .legend{display:flex; gap:14px; font-size:11px; flex-wrap:wrap; margin-top:8px; justify-content:center;}
  .legend span{display:inline-flex; align-items:center; gap:5px;}
  .swatch{width:11px; height:11px; border-radius:2px;}
  .controls{width:100%; max-width:640px; display:flex; flex-direction:column; gap:14px;}
  .row{display:flex; align-items:center; gap:12px;}
  .row label{flex:0 0 140px; font-size:13px;}
  .row input[type=range]{flex:1;}
  .row .val{flex:0 0 46px; text-align:right; font-size:13px; font-variant-numeric:tabular-nums;}
  .resultBox{width:100%; max-width:640px; font-size:13px; background:#f4f4f4; border-radius:8px; padding:12px 16px; line-height:1.8; white-space:pre-line;}
</style>
</head>
<body>

<h3 id="titleText">LBO資産形成シミュレーション</h3>

<div id="viz">
  <svg id="chart" viewBox="0 0 640 420" xmlns="http://www.w3.org/2000/svg"></svg>
  <div class="legend">
    <span><span class="swatch" style="background:var(--equity0);"></span>当初の自己資本</span>
    <span><span class="swatch" style="background:var(--growth);"></span>物件の値上がり分</span>
    <span><span class="swatch" style="background:var(--repay);"></span>家賃収入による借金返済</span>
    <span><span class="swatch" style="background:var(--tax);"></span>税シールド</span>
    <span><span class="swatch" style="background:var(--debt); opacity:0.3;"></span>負債</span>
  </div>
</div>

<div class="controls">
  <div class="row">
    <label for="year">経過年数</label>
    <input type="range" id="year" min="0" max="5" step="1" value="0">
    <span class="val" id="yearVal">0</span>
  </div>
</div>

<div class="resultBox" id="resultText"></div>

<script>
// ---- 前提条件(元コードと同じ) ----
const initial_value = 100.0;
const initial_equity = 20.0;
const initial_debt = 80.0;
const total_years = 5;
const total_growth = 10.0;
const total_repayment = 32.0;
const total_tax_savings = 3.0;

const M = {l:60, r:20, t:40, b:40};
const svgW = 640, svgH = 420;
const plotW = svgW - M.l - M.r, plotH = svgH - M.t - M.b;
const yMax = 130; // ax.set_ylim(0, 130)

function sy(v){ return M.t + plotH - (v/yMax) * plotH; }

const svg = document.getElementById('chart');
const ns = 'http://www.w3.org/2000/svg';
function el(tag, attrs){
  const e = document.createElementNS(ns, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}

function drawAxes(){
  for (let v=0; v<=130; v+=20){
    svg.appendChild(el('line', {x1:M.l, x2:svgW-M.r, y1:sy(v), y2:sy(v), stroke:'var(--grid)', 'stroke-dasharray':'4,3'}));
    const t = el('text', {x:M.l-8, y:sy(v)+3, 'font-size':10, 'text-anchor':'end', fill:'var(--ink)'});
    t.textContent = v;
    svg.appendChild(t);
  }
  svg.appendChild(el('line', {x1:M.l, x2:M.l, y1:M.t, y2:svgH-M.b, stroke:'var(--ink)', 'stroke-opacity':0.4}));
  svg.appendChild(el('line', {x1:M.l, x2:svgW-M.r, y1:svgH-M.b, y2:svgH-M.b, stroke:'var(--ink)', 'stroke-opacity':0.4}));

  const yLabel = el('text', {x:-(sy(65)), y:16, 'font-size':12, transform:'rotate(-90)', fill:'var(--ink)'});
  yLabel.textContent = '価値 (Million Yen)';
  svg.appendChild(yLabel);
}

function render(){
  svg.innerHTML = '';
  drawAxes();

  const year = parseInt(document.getElementById('year').value);
  document.getElementById('yearVal').textContent = year;

  const current_growth = (total_growth / total_years) * year;
  const current_repayment = (total_repayment / total_years) * year;
  const current_tax_savings = (total_tax_savings / total_years) * year;
  const current_debt = initial_debt - current_repayment;

  const equity_components = [
    {value: initial_equity, color:'var(--equity0)', label:'当初の自己資本'},
    {value: current_growth, color:'var(--growth)', label:'物件の値上がり分'},
    {value: current_repayment, color:'var(--repay)', label:'家賃収入による借金返済'},
    {value: current_tax_savings, color:'var(--tax)', label:'税シールド'}
  ];

  const barGap = plotW * 0.25;
  const barW = (plotW - barGap*3) / 2;
  const x0 = M.l + barGap*0.6;
  const xX = M.l + barGap*1.8 + barW;

  // --- Year 0 の棒(購入時): 自己資本 + 負債 ---
  svg.appendChild(el('rect', {
    x:x0, y:sy(initial_equity), width:barW, height: plotH-(sy(initial_equity)-M.t),
    fill:'var(--equity0)'
  }));
  svg.appendChild(el('rect', {
    x:x0, y:sy(initial_equity+initial_debt), width:barW, height: sy(initial_equity)-sy(initial_equity+initial_debt),
    fill:'var(--debt)', 'fill-opacity':0.3
  }));
  const total0 = initial_equity + initial_debt;
  const t0 = el('text', {x:x0+barW/2, y:sy(total0)-8, 'font-size':12, 'text-anchor':'middle', 'font-weight':'bold', fill:'var(--ink)'});
  t0.textContent = `Total: ${total0.toFixed(1)}M`;
  svg.appendChild(t0);
  const l0 = el('text', {x:x0+barW/2, y:svgH-M.b+18, 'font-size':11, 'text-anchor':'middle', fill:'var(--ink)'});
  l0.textContent = 'Purchase (Year 0)';
  svg.appendChild(l0);

  if (initial_equity > 0.5){
    const teq = el('text', {x:x0+barW/2, y:sy(initial_equity/2)+4, 'font-size':11, 'text-anchor':'middle', fill:'white', 'font-weight':'bold'});
    teq.textContent = `${initial_equity.toFixed(1)}M`;
    svg.appendChild(teq);
  }

  // --- Year X の棒(運用中): equity_components を積み上げ + 残債 ---
  let bottom = 0;
  equity_components.forEach(seg => {
    if (seg.value <= 0) return;
    const yTop = sy(bottom+seg.value), yBot = sy(bottom);
    svg.appendChild(el('rect', {
      x:xX, y:yTop, width:barW, height: yBot-yTop, fill: seg.color
    }));
    if (seg.value > 0.5){
      const label = el('text', {
        x:xX+barW/2, y:sy(bottom+seg.value/2)+4, 'font-size':11, 'text-anchor':'middle', 'font-weight':'bold',
        fill: seg.color === 'var(--tax)' ? 'black' : 'white'
      });
      label.textContent = `${seg.value.toFixed(1)}M`;
      svg.appendChild(label);
    }
    bottom += seg.value;
  });

  // 残債の積み上げ
  if (current_debt > 0){
    const yTop = sy(bottom+current_debt), yBot = sy(bottom);
    svg.appendChild(el('rect', {
      x:xX, y:yTop, width:barW, height: yBot-yTop, fill:'var(--debt)', 'fill-opacity':0.3
    }));
    const dLabel = el('text', {x:xX+barW/2, y:sy(bottom+current_debt/2)+4, 'font-size':10, 'text-anchor':'middle', fill:'var(--debt)', 'font-weight':'bold'});
    dLabel.textContent = `負債残高: ${current_debt.toFixed(1)}M`;
    svg.appendChild(dLabel);
  }

  const totalX = equity_components.reduce((s,c)=>s+c.value,0) + current_debt;
  const tX = el('text', {x:xX+barW/2, y:sy(totalX)-8, 'font-size':12, 'text-anchor':'middle', 'font-weight':'bold', fill:'blue'});
  tX.textContent = `Total: ${totalX.toFixed(1)}M`;
  svg.appendChild(tX);
  const lX = el('text', {x:xX+barW/2, y:svgH-M.b+18, 'font-size':11, 'text-anchor':'middle', fill:'var(--ink)'});
  lX.textContent = `Year ${year}`;
  svg.appendChild(lX);

  // --- タイトル & 結果テキスト ---
  const total_equity = equity_components.reduce((s,c)=>s+c.value,0);
  document.getElementById('titleText').textContent = `LBO資産形成シミュレーション: ${year}年目`;

  document.getElementById('resultText').textContent =
    `現在の純資産合計: ${total_equity.toFixed(2)}M Yen\n\n` +
    `当初の自己資本: ${initial_equity.toFixed(1)}M\n` +
    `物件の値上がり分: +${current_growth.toFixed(1)}M\n` +
    `借金返済累計: +${current_repayment.toFixed(1)}M\n` +
    `税シールド累計: +${current_tax_savings.toFixed(1)}M\n` +
    `負債残高: ${current_debt.toFixed(1)}M`;
}

document.getElementById('year').addEventListener('input', render);
render();
</script>
</body>
</html>
